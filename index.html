<!-- TensorFlow.js + COCO-SSD — loaded with multi-CDN fallback (see loader script at bottom) -->
<!-- We use the parallel preconnect tags below to warm up the CDNs while HTML parses -->
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="preconnect" href="https://unpkg.com" crossorigin>

<style>
  /* ---------- Reset & base ---------- */
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #000; color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased; user-select: none;
    touch-action: manipulation;
  }
  :root {
    --accent-blue: #0A84FF;
    --accent-purple: #BF5AF2;
    --glass: rgba(28, 28, 30, 0.6);
    --glass-border: rgba(255, 255, 255, 0.15);
  }

  /* ---------- App container ---------- */
  #app { position: relative; width: 100vw; height: 100vh; height: 100dvh; overflow: hidden; }

  /* ---------- Video & canvas ---------- */
  #video, #overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    object-fit: cover;
  }
  #video { z-index: 1; background: #000; }
  #overlay { z-index: 2; pointer-events: none; }

  /* Make overlay receive taps on boxes */
  #tapLayer { position: absolute; inset: 0; z-index: 3; }

  /* ---------- Top bar ---------- */
  .top-bar {
    position: absolute; top: 0; left: 0; right: 0; z-index: 10;
    padding: max(env(safe-area-inset-top), 16px) 16px 12px;
    display: flex; align-items: center; gap: 12px;
    background: linear-gradient(180deg, rgba(0,0,0,0.55), rgba(0,0,0,0));
    pointer-events: none;
  }
  .top-bar > * { pointer-events: auto; }

  .lang-toggle {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 14px; border-radius: 999px;
    background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border); color: #fff;
    font-size: 13px; font-weight: 700; letter-spacing: 0.5px;
    cursor: pointer; transition: transform 0.15s ease, background 0.2s ease;
  }
  .lang-toggle:active { transform: scale(0.94); background: rgba(255,255,255,0.15); }
  .lang-toggle .swap { font-size: 11px; opacity: 0.7; }

  .spacer { flex: 1; }

  .count-badge {
    display: none; padding: 8px 13px; border-radius: 999px;
    background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    font-size: 12px; font-weight: 600; color: #fff;
    white-space: nowrap;
  }
  .count-badge.visible { display: inline-block; }

  .power-btn {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border); color: #fff;
    font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s ease, background 0.2s ease;
  }
  .power-btn:active { transform: scale(0.92); background: rgba(255,255,255,0.15); }

  /* ---------- Bottom area ---------- */
  .bottom-area {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 10;
    padding: 16px 16px max(env(safe-area-inset-bottom), 32px);
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    background: linear-gradient(0deg, rgba(0,0,0,0.55), rgba(0,0,0,0));
    pointer-events: none;
  }
  .bottom-area > * { pointer-events: auto; }

  .hint {
    padding: 10px 18px; border-radius: 999px;
    background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.85);
    transition: opacity 0.3s ease;
  }

  /* ---------- Object info card ---------- */
  .object-card {
    display: none; width: 100%; max-width: 420px;
    padding: 16px 20px; border-radius: 18px;
    background: var(--glass); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    border: 1.5px solid var(--card-color, #fff);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 24px var(--card-glow, transparent);
    animation: slideUp 0.35s cubic-bezier(0.2, 0.9, 0.3, 1.1);
  }
  .object-card.visible { display: flex; align-items: center; gap: 14px; }
  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .obj-icon {
    flex-shrink: 0; width: 44px; height: 44px; border-radius: 50%;
    background: var(--card-color-faded, rgba(255,255,255,0.15));
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  .obj-text { flex: 1; min-width: 0; }
  .obj-name {
    font-size: 19px; font-weight: 700; color: #fff; letter-spacing: -0.3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .obj-meta {
    margin-top: 3px; font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.65);
  }
  .obj-chip { flex-shrink: 0; width: 5px; height: 36px; border-radius: 3px; background: var(--card-color, #fff); }

  /* ---------- Loading screen ---------- */
  .loader {
    position: absolute; inset: 0; z-index: 100;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px;
    background: #000; transition: opacity 0.4s ease;
  }
  .loader.hidden { opacity: 0; pointer-events: none; }
  .spinner {
    width: 40px; height: 40px; border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.15); border-top-color: var(--accent-blue);
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loader-text { font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.7); text-align: center; padding: 0 32px; }
  .loader-sub { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: -4px; word-break: break-all; max-width: 280px; text-align: center; }
  .loader-retry { display: none; margin-top: 8px; padding: 10px 22px; border-radius: 10px; border: 1px solid var(--glass-border); background: var(--glass); color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; }
  .loader-retry.visible { display: inline-block; }

  .ai-loading-badge {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 5;
    padding: 10px 18px; border-radius: 999px;
    background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.9);
    display: none; align-items: center; gap: 10px;
  }
  .ai-loading-badge.visible { display: inline-flex; }
  .ai-loading-badge .mini-spinner {
    width: 14px; height: 14px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.2); border-top-color: #fff;
    animation: spin 0.9s linear infinite;
  }

  /* ---------- Scan strip (top-3 MobileNet predictions) ---------- */
  .scan-strip {
    position: absolute; top: calc(max(env(safe-area-inset-top), 16px) + 56px); left: 16px; right: 16px; z-index: 9;
    display: flex; gap: 8px; overflow-x: auto; padding: 2px;
    scrollbar-width: none; -ms-overflow-style: none;
    pointer-events: none;
  }
  .scan-strip::-webkit-scrollbar { display: none; }
  .scan-strip .scan-chip {
    flex-shrink: 0; display: inline-flex; align-items: center; gap: 7px;
    padding: 7px 13px; border-radius: 999px;
    background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    font-size: 13px; font-weight: 600; color: #fff;
    pointer-events: auto; cursor: pointer;
    transition: transform 0.15s ease, background 0.2s ease;
    animation: chipFadeIn 0.3s ease;
  }
  .scan-strip .scan-chip:active { transform: scale(0.94); background: rgba(255,255,255,0.18); }
  .scan-strip .scan-chip .chip-icon { font-size: 15px; }
  .scan-strip .scan-chip .chip-conf { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.55); margin-left: 2px; }
  @keyframes chipFadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

  /* ---------- Top-bar action buttons (capture, share, speak) ---------- */
  .action-btn {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border); color: #fff;
    font-size: 17px; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    transition: transform 0.15s ease, background 0.2s ease;
  }
  .action-btn:active { transform: scale(0.92); background: rgba(255,255,255,0.18); }
  .action-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .action-btn.speak-active { background: var(--accent-purple); border-color: var(--accent-purple); }

  /* ---------- Toast notification ---------- */
  .toast {
    position: absolute; bottom: calc(max(env(safe-area-inset-bottom), 32px) + 90px); left: 50%; transform: translateX(-50%);
    z-index: 20;
    padding: 11px 18px; border-radius: 12px;
    background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    color: #fff; font-size: 13px; font-weight: 600;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s ease, transform 0.25s ease;
    max-width: 80vw; text-align: center;
  }
  .toast.visible { opacity: 1; transform: translateX(-50%) translateY(-6px); }

  /* ---------- Permission / error screen ---------- */
  .gate {
    position: absolute; inset: 0; z-index: 90;
    display: none; flex-direction: column; align-items: center; justify-content: center; gap: 24px;
    padding: 32px; text-align: center; background: #000;
  }
  .gate.visible { display: flex; }
  .gate-icon { font-size: 64px; opacity: 0.4; }
  .gate-title { font-size: 16px; font-weight: 600; color: #fff; line-height: 1.5; }
  .gate-btn {
    padding: 12px 24px; border-radius: 12px; border: none;
    background: var(--accent-blue); color: #fff;
    font-size: 15px; font-weight: 600; cursor: pointer;
    transition: transform 0.15s ease, opacity 0.2s ease;
  }
  .gate-btn:active { transform: scale(0.96); }
</style>

<div id="app">

  <!-- Loading screen -->
  <div class="loader" id="loader">

  <!-- SAM2 status badge (shown while SAM2 loads on first tap, or during segmentation) -->

  <!-- Scan strip: top-3 MobileNet (1000-class) predictions as tappable chips -->
  <div class="scan-strip" id="scanStrip"></div>

  <!-- Permission / error gate -->
  <div class="gate" id="gate">
    <div class="gate-icon" id="gateIcon">📷</div>
    <div class="gate-title" id="gateTitle">Camera access is required.</div>
    <button class="gate-btn" id="gateBtn">Open Settings</button>
  </div>
</div>

<script>
/* ============================================================
   Vision Segmenter — single-file web app
   - getUserMedia → back camera
   - TensorFlow.js + COCO-SSD → 80-class real-time detection
   - Color-coded borders by category
   - Tap any highlighted object → name + confidence card
   - EN / IT toggle with full label translations
   ============================================================ */

// ---------- Loader sub-text + retry button refs (declared early) ----------
const _loaderSub = document.getElementById("loaderSub");
const _loaderRetry = document.getElementById("loaderRetry");
const _spinner = document.getElementById("spinner");
const _aiBadge = document.getElementById("aiBadge");
const _aiBadgeText = document.getElementById("aiBadgeText");
function setLoaderSub(msg) { _loaderSub.textContent = msg || ""; }
function showRetryButton() { _loaderRetry.classList.add("visible"); _spinner.style.display = "none"; }
function hideRetryButton() { _loaderRetry.classList.remove("visible"); _spinner.style.display = "block"; }
function showAiBadge(msg) { _aiBadgeText.textContent = msg; _aiBadge.classList.add("visible"); }
function hideAiBadge() { _aiBadge.classList.remove("visible"); }

// ---------- Dynamic script loader with multi-CDN fallback ----------
// Some Italian ISPs / networks block jsDelivr. We try multiple CDNs.
const TFJS_CDNS = [
  "https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js",
  "https://unpkg.com/@tensorflow/tfjs@4.20.0/dist/tf.min.js",
  "https://cdnjs.cloudflare.com/ajax/libs/tensorflow/4.20.0/tf.min.js"
];
const COCO_CDNS = [
  "https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js",
  "https://unpkg.com/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js",
  "https://storage.googleapis.com/tfjs-models/savedmodel/coco-ssd/coco-ssd.min.js"
];
const MOBILENET_CDNS = [
  "https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.1/dist/mobilenet.min.js",
  "https://unpkg.com/@tensorflow-models/mobilenet@2.1.1/dist/mobilenet.min.js",
  "https://storage.googleapis.com/tfjs-models/savedmodel/mobilenet/mobilenet_v2_1.0_224/model.json"
];

function loadScript(urls, label) {
  return new Promise((resolve, reject) => {
    let i = 0;
    const tryNext = () => {
      if (i >= urls.length) {
        reject(new Error(`All CDNs failed for ${label}`));
        return;
      }
      const url = urls[i++];
      setLoaderSub(`${label}: CDN ${i}/${urls.length}`);
      console.log(`[loader] trying ${label}:`, url);
      const s = document.createElement("script");
      s.src = url;
      s.async = true;
      s.onload = () => { console.log(`[loader] OK ${label}:`, url); resolve(url); };
      s.onerror = () => {
        console.warn(`[loader] failed ${label}:`, url);
        s.remove();
        tryNext();
      };
      // Per-CDN timeout: 15s
      const to = setTimeout(() => {
        console.warn(`[loader] timeout ${label}:`, url);
        s.remove();
        tryNext();
      }, 15000);
      s.onload  = () => { clearTimeout(to); resolve(url); };
      s.onerror = () => { clearTimeout(to); s.remove(); tryNext(); };
      document.head.appendChild(s);
    };
    tryNext();
  });
}

// ---------- Load TFJS + COCO-SSD + MobileNet with fallbacks + parallel loading ----------
// Pre-warm backend while scripts are still downloading (saves ~200ms)
async function loadDependencies() {
  // Load TFJS first (COCO-SSD and MobileNet depend on it)
  if (typeof tf === "undefined") {
    setLoaderSub("TensorFlow.js…");
    await loadScript(TFJS_CDNS, "TensorFlow.js");
  }
  // Initialize backend AS SOON AS tf is available, in parallel with model libs load
  const backendPromise = (async () => {
    try {
      await tf.setBackend("webgl");
      await tf.ready();
      console.log("[tf] backend:", tf.getBackend());
    } catch (e) {
      console.warn("[tf] webgl backend failed, trying cpu", e);
      try {
        await tf.setBackend("cpu");
        await tf.ready();
      } catch (e2) {
        console.error("[tf] cpu backend also failed", e2);
      }
    }
  })();

  // Load COCO-SSD and MobileNet in parallel
  const tasks = [];
  if (typeof cocoSsd === "undefined") {
    tasks.push(loadScript(COCO_CDNS, "COCO-SSD").then(() => console.log("[loader] coco-ssd ready")));
  }
  if (typeof mobilenet === "undefined") {
    tasks.push(loadScript(MOBILENET_CDNS, "MobileNet").then(() => console.log("[loader] mobilenet ready")));
  }
  setLoaderSub("Loading model libraries…");
  await Promise.all(tasks);
  await backendPromise;
}

// Retry button handler
_loaderRetry.addEventListener("click", () => {
  hideRetryButton();
  setLoaderSub("");
  init();
});

// Italian translations of common ImageNet classes (MobileNet returns these).
// ~400 entries covering the most common objects. Unlisted labels fall back to English.
const IT_IMAGENET = {
  // Animals — dogs
  "golden retriever": "Golden Retriever", "labrador retriever": "Labrador Retriever",
  "german shepherd": "Pastore Tedesco", "poodle": "Barboncino", "chihuahua": "Chihuahua",
  "pug": "Carlino", "boxer": "Boxer", "husky": "Husky", "border collie": "Border Collie",

const CATEGORIES = {
  person:      { color: "#FF453A", icon: "👤" }, // red
  vehicle:     { color: "#0A84FF", icon: "🚗" }, // blue
  animal:      { color: "#30D158", icon: "🐾" }, // green
  food:        { color: "#FF9F0A", icon: "🍽" }, // orange
  kitchen:     { color: "#64D2FF", icon: "🍴" }, // cyan
  furniture:   { color: "#BF5AF2", icon: "🛋" }, // purple
  electronics: { color: "#5E5CE6", icon: "💻" }, // indigo
  outdoor:     { color: "#73FB7D", icon: "🌳" }, // light green
  sports:      { color: "#FFD60A", icon: "⚽" }, // yellow
  indoor:      { color: "#FF6FED", icon: "📦" }, // pink
  other:       { color: "#FFD60A", icon: "•"  }  // yellow
};

function categoryOf(label) {
  const l = label.toLowerCase();
  if (l === "person") return "person";
  if (["bicycle","car","motorcycle","airplane","bus","train","truck","boat"].includes(l)) return "vehicle";
  if (["bird","cat","dog","horse","sheep","cow","elephant","bear","zebra","giraffe"].includes(l)) return "animal";
  if (["banana","apple","sandwich","orange","broccoli","carrot","hot dog","pizza","donut","cake"].includes(l)) return "food";
  if (["bottle","wine glass","cup","fork","knife","spoon","bowl","microwave","oven","toaster","sink","refrigerator"].includes(l)) return "kitchen";
  if (["chair","couch","potted plant","bed","dining table","toilet"].includes(l)) return "furniture";
  if (["tv","laptop","mouse","remote","keyboard","cell phone"].includes(l)) return "electronics";
  if (["traffic light","fire hydrant","stop sign","parking meter","bench"].includes(l)) return "outdoor";
  if (["frisbee","skis","snowboard","sports ball","kite","baseball bat","baseball glove","skateboard","surfboard","tennis racket"].includes(l)) return "sports";
  if (["backpack","umbrella","handbag","tie","suitcase","book","clock","vase","scissors","teddy bear","hair drier","toothbrush"].includes(l)) return "indoor";
  return "other";
}

// ---------- SAM2 (Meta Segment Anything 2) — lazy loader + inference ----------
// Uses @huggingface/transformers v3 which has SAM2 ONNX support.
// Loads ON DEMAND on first tap (40MB download, then cached in IndexedDB).
// Subsequent taps: ~200-500ms inference on iPhone Safari with WebGL.

const SAM2_MODEL_ID = "Xenova/sam2-hiera-small";  // better quality than tiny (~80MB fp32)

async function loadSam2() {
  if (sam2Pipeline) return sam2Pipeline;
  if (sam2LoadingPromise) return sam2LoadingPromise;
  sam2Loading = true;
  setSam2Status(currentLang === "it" ? "Caricamento SAM2…" : "Loading SAM2…");

  sam2LoadingPromise = (async () => {
    try {
      // Dynamically import transformers.js (ESM module from CDN)
      const tfjs = await import("https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.2");
      // Configure to use WebGL backend + IndexedDB cache
      tfjs.env.allowLocalModels = false;
      tfjs.env.useBrowserCache = true;

      // Load SAM2 pipeline (image + prompt → mask)
      let pipeline;
      try {
        pipeline = await tfjs.Sam2Pipeline.from_pretrained(SAM2_MODEL_ID, {
          dtype: "fp32",  // full precision for best mask quality
          device: "webgpu", // WebGPU backend (much faster than wasm, with fallback)
        });
      } catch (gpuErr) {
        console.warn("[sam2] WebGPU failed, falling back to wasm", gpuErr);
        pipeline = await tfjs.Sam2Pipeline.from_pretrained(SAM2_MODEL_ID, {
          dtype: "q8",
          device: "wasm",
        });
      }
      sam2Pipeline = pipeline;
      console.log("[sam2] loaded");
      setSam2Status("");
      sam2Loading = false;
      return pipeline;
    } catch (err) {
      console.error("[sam2] load failed", err);
      sam2Loading = false;
      sam2LoadingPromise = null;
      setSam2Status("");
      throw err;
    }
  })();

  return sam2LoadingPromise;
}

// Status badge shown while SAM2 loads / infers
function setSam2Status(msg) {
  const el = document.getElementById("sam2Status");
  if (el) {
    const span = el.querySelector("span");
    if (span) span.textContent = msg;
    el.classList.toggle("visible", !!msg);
  }
}

// Run SAM2 on the current video frame with a point prompt.
// Returns { mask: Uint8Array (W*H of 0/1), width, height } or null on failure.
async function runSam2(pointX, pointY) {
  const pipeline = await loadSam2();
  if (!pipeline) return null;

  setSam2Status(currentLang === "it" ? "Segmentazione SAM2…" : "SAM2 segmenting…");
  try {
    // Capture current video frame to a RawImage (RGBA)
    const w = video.videoWidth, h = video.videoHeight;
    if (!w || !h) return null;

    // Create a temporary canvas to extract pixels
    const tmp = document.createElement("canvas");
    tmp.width = w; tmp.height = h;
    const tctx = tmp.getContext("2d");
    tctx.drawImage(video, 0, 0, w, h);
    const imageData = tctx.getImageData(0, 0, w, h);

    // transformers.js expects { data: Uint8Array(RGBA), width, height }
    // The point prompt is normalized [0,1] coordinates with origin top-left
    const inputs = {
      image: {
        data: imageData.data,
        width: w,
        height: h,
        channels: 4,
      },
      // Point prompt: [[x, y]] in normalized [0,1] coordinates
      // Label 1 = foreground point (object we want to segment)
      point_coords: [[[pointX / w, pointY / h]]],
      point_labels: [[1]],
    };

    const output = await pipeline(inputs);
    // Output structure: { masks: Tensor[1,1,H,W], iou_scores: Tensor[1,N] }
    // Pick the mask with highest IoU score
    let masks = output.masks;
    let ious = output.iou_scores;
    if (!masks) return null;

    // masks may be a Tensor or a typed array; flatten to Uint8Array
    let maskData;
    let maskW = w, maskH = h;
    if (masks.data && masks.dims) {
      // Tensor shape [N, 1, H, W] — pick best by IoU
      const N = masks.dims[0];
      const H = masks.dims[masks.dims.length - 2];
      const W = masks.dims[masks.dims.length - 1];
      maskW = W; maskH = H;
      const all = masks.data;
      let bestIdx = 0, bestIou = -1;
      if (ious && ious.data) {
        for (let i = 0; i < N; i++) {
          if (ious.data[i] > bestIou) { bestIou = ious.data[i]; bestIdx = i; }
        }
      }
      const sliceLen = H * W;
      maskData = new Uint8Array(sliceLen);
      const start = bestIdx * sliceLen;
      for (let i = 0; i < sliceLen; i++) {
        maskData[i] = all[start + i] > 0.5 ? 1 : 0;
      }
    } else {
      // Already a flat array
      maskData = new Uint8Array(masks.length);
      for (let i = 0; i < masks.length; i++) maskData[i] = masks[i] > 0.5 ? 1 : 0;
    }

    setSam2Status("");
    return { mask: maskData, width: maskW, height: maskH };
  } catch (err) {
    console.error("[sam2] inference failed", err);
    setSam2Status("");
    return null;
  }
}

// ---------- Mask outline drawing (marching squares) ----------
// Given a binary mask (W*H of 0/1), trace the boundary as an array of [x,y] points.
// Returns null if the mask is empty.
function traceMaskOutline(mask, w, h) {
  // Moore neighborhood boundary tracing — fast and simple
  // Find a starting boundary pixel (first 1 reading left-to-right, top-to-bottom)
  let start = -1;
  for (let y = 0; y < h && start === -1; y++) {
    for (let x = 0; x < w && start === -1; x++) {
      if (mask[y * w + x]) { start = y * w + x; }
    }
  }
  if (start === -1) return null;

  // 8-connectivity, clockwise
  const dx = [1, 1, 0, -1, -1, -1, 0, 1];
  const dy = [0, 1, 1, 1, 0, -1, -1, -1];
  const pts = [];
  let cx = start % w, cy = Math.floor(start / w);
  let dir = 7; // start direction
  const maxSteps = w * h * 4;  // safety limit
  let steps = 0;
  const visited = new Set();
  while (steps < maxSteps) {
    const key = cy * w + cx;
    if (visited.has(key) && visited.size > 2) break;
    visited.add(key);
    pts.push([cx, cy]);
    // Find next boundary pixel clockwise from backtrack direction
    let found = false;
    for (let i = 0; i < 8; i++) {
      const ndir = (dir + 1 + i) % 8;  // start from backtrack+1
      const nx = cx + dx[ndir], ny = cy + dy[ndir];
      if (nx < 0 || ny < 0 || nx >= w || ny >= h) continue;
      if (mask[ny * w + nx]) {
        cx = nx; cy = ny; dir = (ndir + 4) % 8;  // backtrack = opposite
        found = true; break;
      }
    }
    if (!found) break;
    steps++;
  }
  return pts.length > 4 ? pts : null;
}

// Draw the SAM2 mask: filled translucent region + colored outline
function drawSam2Mask(mask, w, h, color, videoW, videoH) {
  // Mask is at SAM2's internal resolution (e.g. 256x256) — scale to video resolution
  const scaleX = videoW / w, scaleY = videoH / h;

  // 1) Translucent fill — create ImageData on a temp canvas, scale up
  const tmp = document.createElement("canvas");
  tmp.width = w; tmp.height = h;
  const tctx = tmp.getContext("2d");
  const imgData = tctx.createImageData(w, h);
  // Parse color #RRGGBB → r,g,b
  const r = parseInt(color.slice(1,3), 16);
  const g = parseInt(color.slice(3,5), 16);
  const b = parseInt(color.slice(5,7), 16);
  for (let i = 0; i < mask.length; i++) {
    if (mask[i]) {
      imgData.data[i*4]   = r;
      imgData.data[i*4+1] = g;
      imgData.data[i*4+2] = b;
      imgData.data[i*4+3] = 90;  // ~35% opacity
    }
  }
  tctx.putImageData(imgData, 0, 0);

  // Scale up to video resolution and draw onto overlay
  ctx.save();
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = "high";
  ctx.drawImage(tmp, 0, 0, videoW, videoH);
  ctx.restore();

  // 2) Pixel-accurate outline (traced boundary)
  const pts = traceMaskOutline(mask, w, h);
  if (pts && pts.length > 4) {
    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth = Math.max(2.5, videoW * 0.006);
    ctx.lineJoin = "round";
    ctx.lineCap = "round";
    ctx.shadowColor = color;
    ctx.shadowBlur = 16;
    // Smooth curve through ALL points using Catmull-Rom → Bezier conversion
    // This produces pixel-accurate smooth outlines instead of jagged line segments
    ctx.beginPath();
    ctx.moveTo(pts[0][0] * scaleX, pts[0][1] * scaleY);
    const n = pts.length;
    for (let i = 0; i < n; i++) {
      const p0 = pts[(i - 1 + n) % n];
      const p1 = pts[i];
      const p2 = pts[(i + 1) % n];
      const p3 = pts[(i + 2) % n];
      // Catmull-Rom to cubic Bezier conversion (tension = 0.5)
      const cp1x = (p1[0] + (p2[0] - p0[0]) / 6) * scaleX;
      const cp1y = (p1[1] + (p2[1] - p0[1]) / 6) * scaleY;
      const cp2x = (p2[0] - (p3[0] - p1[0]) / 6) * scaleX;
      const cp2y = (p2[1] - (p3[1] - p1[1]) / 6) * scaleY;
      const x = p2[0] * scaleX;
      const y = p2[1] * scaleY;
      ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, x, y);
    }
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
  }
}

// ---------- CLIP zero-shot classifier (500+ vocabulary, lazy-loaded) ----------
// CLIP compares an image to a list of text labels and returns the best match.
// Unlike MobileNet (fixed 1000 ImageNet classes), CLIP can recognize ANY object
// in our curated 500+ vocabulary — and we can extend it freely.

const CLIP_MODEL_ID = "Xenova/clip-vit-base-patch32";

async function loadClip() {
  if (clipPipeline) return clipPipeline;
  if (clipLoadingPromise) return clipLoadingPromise;

  setSam2Status(currentLang === "it" ? "Caricamento CLIP…" : "Loading CLIP…");

  clipLoadingPromise = (async () => {
    try {
      // Dynamic import (shares the same module as SAM2 if already loaded)
      const tfjs = await import("https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.2");
      tfjs.env.allowLocalModels = false;
      tfjs.env.useBrowserCache = true;

      // Use the zero-shot-image-classification pipeline
      const pipeline = await tfjs.pipeline("zero-shot-image-classification", CLIP_MODEL_ID, {
        dtype: "q8",  // quantized for ~80MB download (vs 600MB fp32)
        device: "wasm",
      });
      clipPipeline = pipeline;
      console.log("[clip] loaded, vocab size:", VOCABULARY.length);
      setSam2Status("");
      return pipeline;
    } catch (err) {
      console.error("[clip] load failed", err);
      setSam2Status("");
      clipLoadingPromise = null;
      throw err;
    }
  })();

  return clipLoadingPromise;
}

// Run CLIP on a cropped region of the video frame.
// Returns { label, labelIt, score } or null on failure.
async function runClip(cropX, cropY, cropW, cropH) {
  try {
    const pipeline = await loadClip();
    if (!pipeline) return null;

    // Crop the video frame to the bounding box region
    const w = video.videoWidth, h = video.videoHeight;
    if (!w || !h) return null;

    // Clamp crop to video bounds
    const cx = Math.max(0, Math.floor(cropX));
    const cy = Math.max(0, Math.floor(cropY));
    const cw = Math.min(w - cx, Math.floor(cropW));
    const ch = Math.min(h - cy, Math.floor(cropH));
    if (cw < 10 || ch < 10) return null;

    // Create a canvas with the cropped image
    const tmp = document.createElement("canvas");
    tmp.width = cw; tmp.height = ch;
    const tctx = tmp.getContext("2d");
    tctx.drawImage(video, cx, cy, cw, ch, 0, 0, cw, ch);

    // Convert to data URL for CLIP
    const dataUrl = tmp.toDataURL("image/jpeg", 0.85);

    // Run CLIP with our vocabulary as candidate labels
    // The pipeline handles text embedding internally
    const labels = VOCABULARY.map(([en]) => `a photo of a ${en}`);
    const output = await pipeline(dataUrl, labels);

    // output: [{ score: 0.9, label: "a photo of a cup" }, ...]
    if (output && output.length > 0) {
      const top = output[0];
      // Extract the original English label from the prompt
      const enLabel = top.label.replace(/^a photo of a /, "");
      // Find the Italian translation
      const idx = VOCABULARY.findIndex(([en]) => en === enLabel);
      const itLabel = idx >= 0 ? VOCABULARY[idx][1] : enLabel;
      return { label: enLabel, labelIt: itLabel, score: top.score };
    }
    return null;
  } catch (err) {
    console.error("[clip] inference failed", err);
    return null;
  }
}

// Translate a COCO class label (80 classes)
function translateLabel(label) {
  if (currentLang === "it") return IT_LABELS[label] || label;
  return label.charAt(0).toUpperCase() + label.slice(1);
}

// Translate an ImageNet class name from MobileNet.
// ImageNet labels are like "golden retriever" or "n02099601 golden retriever".
// We strip the synset ID prefix and look up in IT_IMAGENET.
function translateImageNetLabel(rawLabel) {
  // Strip leading synset ID like "n02099601 " if present
  const clean = rawLabel.replace(/^n\d+\s+/, "").trim();
  if (currentLang === "it") {
    return IT_IMAGENET[clean.toLowerCase()] || clean.charAt(0).toUpperCase() + clean.slice(1);
  }
  return clean.charAt(0).toUpperCase() + clean.slice(1);
}

// ---------- Boot (parallel: camera + model) ----------
// State flags so the two parallel tasks can rendezvous
let _cameraReady = false;
let _modelReady = false;
let _cameraError = null;
let _modelError = null;

async function init() {
  updateStaticTexts();
  loaderText.textContent = t("loading_model");
  loader.classList.remove("hidden");
  _cameraReady = false; _modelReady = false; _cameraError = null; _modelError = null;

  // Kick off BOTH the dependency+model load AND the camera request in parallel.
  // This saves 2–5 seconds on first launch and 1–2 seconds on subsequent launches.
  const modelTask = loadModelInBackground();
  const cameraTask = startCameraInBackground();

  // If camera fails immediately, show the gate right away (don't wait for model).
  // If model fails, show retry button.
  // When BOTH succeed, hide loader and start detection loop.
  const [modelResult, cameraResult] = await Promise.allSettled([modelTask, cameraTask]);

  if (cameraResult.status === "rejected" && _cameraError) {
    loader.classList.add("hidden");
    hideAiBadge();
    const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
    showGate(
      "📷",
      isIOS ? t("no_camera_ios") : t("no_camera"),
      t("reload"),
      () => location.reload()
    );
    return;
  }

  if (modelResult.status === "rejected" && _modelError) {
    loaderText.textContent = currentLang === "it" ? "Impossibile caricare il modello AI." : "Could not load the AI model.";
    setLoaderSub((_modelError.message || "Unknown error") + " — tap Retry or check your connection.");
    showRetryButton();
    return;
  }

  // Both succeeded → hide loader + badge, start detection loop
  loader.classList.add("hidden");
  hideAiBadge();
  detectionLoopRunning = true;
  mobilenetLoopRunning = !!mobilenetModel;
  powerBtn.textContent = "⏹";
  detectLoop();
  if (mobilenetLoopRunning) mobilenetLoop();
  updateStaticTexts();
}

// Background model loader — sets _modelReady / _modelError
// Loads COCO-SSD AND MobileNet in parallel
async function loadModelInBackground() {
  try {
    await loadDependencies();

    setLoaderSub(currentLang === "it" ? "Caricamento modelli…" : "Loading models…");
    // Race: model load vs 60s timeout
    const timeoutPromise = new Promise((_, reject) =>
      setTimeout(() => reject(new Error("Model load timeout (60s)")), 60000)
    );

    // Load both models in parallel (they don't depend on each other)
    const cocoPromise = cocoSsd.load({ base: "lite_mobilenet_v2" })
      .then(m => { console.log("[model] coco-ssd loaded"); model = m; });
    const mobilenetPromise = mobilenet.load({ version: 2, alpha: 1.0 })
      .then(m => { console.log("[model] mobilenet loaded"); mobilenetModel = m; })
      .catch(err => { console.warn("[model] mobilenet failed (continuing with COCO only)", err); });

    await Promise.race([
      Promise.all([cocoPromise, mobilenetPromise]),
      timeoutPromise
    ]);

    if (!model) throw new Error("COCO-SSD failed to load");
    _modelReady = true;
    console.log("[model] ready — coco:", !!model, "mobilenet:", !!mobilenetModel, "backend:", tf.getBackend());
  } catch (err) {
    console.error("[model] load failed", err);
    _modelError = err;
    throw err;
  }
}

// Background camera starter — sets _cameraReady / _cameraError
async function startCameraInBackground() {
  try {
    setLoaderSub(currentLang === "it" ? "Avvio fotocamera…" : "Starting camera…");
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: "environment" }, width: { ideal: 640 }, height: { ideal: 480 } },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
    if (!video.videoWidth) {
      await new Promise(res => video.onloadedmetadata = res);
      await video.play();
    }
    resizeCanvas();
    _cameraReady = true;
    console.log("[camera] ready:", video.videoWidth, "x", video.videoHeight);
  } catch (err) {
    console.error("[camera] failed", err);
    _cameraError = err;
    throw err;
  }
}

function stopCamera() {
  detectionLoopRunning = false;
  mobilenetLoopRunning = false;
  if (stream) stream.getTracks().forEach(t => t.stop());
  stream = null;
  video.srcObject = null;

// ---------- Detection loop (improved: lower threshold, more detections, NMS post-processing) ----------
// COCO-SSD already does internal NMS, but we apply additional filtering to:
//  - Remove very tiny boxes (often false positives from noise)
//  - Remove duplicate overlapping boxes of the same class (IoU > 0.45)
//  - Sort by score and cap at 20 visible detections

function iou(a, b) {
  const [ax, ay, aw, ah] = a.bbox;
  const [bx, by, bw, bh] = b.bbox;
  const x1 = Math.max(ax, bx);
  const y1 = Math.max(ay, by);
  const x2 = Math.min(ax + aw, bx + bw);
  const y2 = Math.min(ay + ah, by + bh);
  const interW = Math.max(0, x2 - x1);
  const interH = Math.max(0, y2 - y1);
  const inter = interW * interH;
  const union = aw * ah + bw * bh - inter;
  return union > 0 ? inter / union : 0;
}

function postProcessDetections(preds, videoW, videoH) {
  // Map to our detection objects
  let dets = preds.map(p => {
    const cat = categoryOf(p.class);
    return {
      bbox: p.bbox,
      class: p.class,
      score: p.score,
      category: cat,
      color: CATEGORIES[cat].color
    };
  });

  // Filter out tiny boxes (likely noise/false positives) — require at least 3% of frame
  const minArea = videoW * videoH * 0.0008;  // 0.08% of frame
  dets = dets.filter(d => {
    const [x, y, w, h] = d.bbox;
    return w * h >= minArea && w >= 12 && h >= 12;
  });

  // Sort by score descending so we keep the most confident ones
  dets.sort((a, b) => b.score - a.score);

  // Greedy NMS per-class (remove overlapping duplicates of the same class)
  const IOU_THRESHOLD = 0.45;
  const kept = [];
  for (const d of dets) {
    const overlapsSameClass = kept.some(k =>
      k.class === d.class && iou(k, d) > IOU_THRESHOLD
    );
    if (!overlapsSameClass) kept.push(d);
    if (kept.length >= 20) break;
  }
  return kept;
}

async function detectLoop() {
  if (!detectionLoopRunning || !model || !video.videoWidth) {
    if (detectionLoopRunning) requestAnimationFrame(detectLoop);
    return;
  }
  try {
    // Lower threshold (0.35 instead of 0.5) and higher max detections (20 instead of 10)
    // gives more visible objects at the cost of slightly noisier output — NMS cleans it up.
    const predictions = await model.detect(video, 20, 0.35);
    lastDetections = postProcessDetections(predictions, video.videoWidth, video.videoHeight);
    drawDetections();
    updateCountBadge();
    if (!selectedDetection) updateStaticTexts();
  } catch (err) {
    console.warn("Detection error", err);
  }
  // Adaptive throttle: ~20 FPS when device can keep up
  setTimeout(() => requestAnimationFrame(detectLoop), 50);
}

// ---------- MobileNet loop (1000-class classification, ~3 Hz) ----------
// Runs in parallel with the COCO-SSD detection loop. Throttled to 350ms so it
// doesn't compete for GPU time. Updates the scan-strip with top-3 predictions.
async function mobilenetLoop() {
  if (!mobilenetLoopRunning || !mobilenetModel || !video.videoWidth) {
    if (mobilenetLoopRunning) setTimeout(mobilenetLoop, 350);
    return;
  }
  try {
    // mobilenet.classify returns top 3 (or topN) predictions with className + probability
    const preds = await mobilenetModel.classify(video, 3);
    // Filter low-confidence ones (<15%) to avoid noise
    lastMobilenet = preds.filter(p => p.probability >= 0.15);
    updateScanStrip();
  } catch (err) {
    console.warn("MobileNet error", err);
  }
  setTimeout(mobilenetLoop, 350);  // ~3 Hz
}

// ---------- Scan-strip UI (top-3 MobileNet chips) ----------
function updateScanStrip() {
  const strip = document.getElementById("scanStrip");
  strip.innerHTML = "";
  for (const p of lastMobilenet.slice(0, 3)) {
    const chip = document.createElement("div");
    chip.className = "scan-chip";
    chip.innerHTML = `<span class="chip-icon">${imagenetIcon(p.className)}</span>` +
      `<span class="chip-label">${translateImageNetLabel(p.className)}</span>` +
      `<span class="chip-conf">${Math.round(p.probability * 100)}%</span>`;
    chip.addEventListener("click", () => {
      showImageNetCard(p);
      if (navigator.vibrate) navigator.vibrate(12);
    });
    strip.appendChild(chip);
  }
}

// ---------- Drawing ----------
function drawDetections() {
  ctx.clearRect(0, 0, overlay.width, overlay.height);

  // If we have a SAM2 mask for the selected object, draw it as a pixel-accurate overlay
  if (lastSam2Mask && selectedDetection) {
    drawSam2Mask(lastSam2Mask.mask, lastSam2Mask.width, lastSam2Mask.height,
                 lastSam2Mask.color, overlay.width, overlay.height);
  }

  for (const d of lastDetections) {
    const [x, y, w, h] = d.bbox;
    const isSelected = selectedDetection && selectedDetection === d;
    // If SAM2 mask is drawn for this object, skip the rectangular box (mask replaces it)
    if (isSelected && lastSam2Mask) continue;
    const lineWidth = Math.max(2, overlay.width * 0.005);

    // Outer glow shadow
    ctx.shadowColor = d.color;
    ctx.shadowBlur = isSelected ? 24 : 12;

    // Solid border
    ctx.strokeStyle = d.color;
    ctx.lineWidth = isSelected ? lineWidth * 1.8 : lineWidth;
    ctx.globalAlpha = isSelected ? 1.0 : 0.85;
    roundRect(ctx, x, y, w, h, Math.min(12, w * 0.08, h * 0.08));
    ctx.stroke();

    // Corner ticks
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1.0;
    drawCornerTicks(ctx, x, y, w, h, d.color, Math.min(w, h) * 0.12, lineWidth);

    // Label background pill (top-left)
    const label = translateLabel(d.class);
    const confTxt = " " + Math.round(d.score * 100) + "%";
    ctx.font = `600 ${Math.max(11, overlay.width * 0.022)}px -apple-system, system-ui, sans-serif`;
    const labelW = ctx.measureText(label).width;
    const confW = ctx.measureText(confTxt).width;
    const pillH = Math.max(18, overlay.width * 0.035);
    const pillW = labelW + confW + 16;
    const pillX = x;
    const pillY = Math.max(0, y - pillH - 4);

    ctx.fillStyle = d.color;
    roundRect(ctx, pillX, pillY, pillW, pillH, pillH / 2);
    ctx.fill();

    ctx.fillStyle = "#000";
    ctx.textBaseline = "middle";
    ctx.textAlign = "left";
    ctx.fillText(label, pillX + 8, pillY + pillH / 2);
    ctx.globalAlpha = 0.7;
    ctx.fillText(confTxt, pillX + 8 + labelW, pillY + pillH / 2);
    ctx.globalAlpha = 1.0;
  }
  ctx.shadowBlur = 0;
}

function roundRect(ctx, x, y, w, h, r) {
  r = Math.max(0, Math.min(r, w / 2, h / 2));
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawCornerTicks(ctx, x, y, w, h, color, len, thick) {
  ctx.strokeStyle = color;
  ctx.lineWidth = thick * 1.4;
  ctx.lineCap = "round";
  // Top-left
  ctx.beginPath();
  ctx.moveTo(x, y + len); ctx.lineTo(x, y); ctx.lineTo(x + len, y);
  ctx.stroke();
  // Top-right
  ctx.beginPath();
  ctx.moveTo(x + w - len, y); ctx.lineTo(x + w, y); ctx.lineTo(x + w, y + len);
  ctx.stroke();
  // Bottom-right
  ctx.beginPath();
  ctx.moveTo(x + w, y + h - len); ctx.lineTo(x + w, y + h); ctx.lineTo(x + w - len, y + h);
  ctx.stroke();
  // Bottom-left
  ctx.beginPath();
  ctx.moveTo(x + len, y + h); ctx.lineTo(x, y + h); ctx.lineTo(x, y + h - len);
  ctx.stroke();
}

// ---------- Tap handling ----------
// Tap coordinates are in CSS pixels relative to the viewport.
// We need to map them to canvas/video pixel coordinates, accounting
// for the object-fit: cover scaling and centering.
function mapTapToVideoCoords(clientX, clientY) {
  const vw = video.videoWidth, vh = video.videoHeight;
  if (!vw || !vh) return null;
  const cw = video.clientWidth, ch = video.clientHeight;
  // object-fit: cover → scale to fill, crop overflow
  const scale = Math.max(cw / vw, ch / vh);
  const renderedW = vw * scale;
  const renderedH = vh * scale;
  const offsetX = (cw - renderedW) / 2;
  const offsetY = (ch - renderedH) / 2;
  // Convert client coords to video-relative coords
  const rect = video.getBoundingClientRect();
  const localX = clientX - rect.left - offsetX;
  const localY = clientY - rect.top  - offsetY;
  // Scale back to video pixel coords
  const vx = localX / scale;
  const vy = localY / scale;
  if (vx < 0 || vy < 0 || vx > vw || vy > vh) return null;
  return { vx, vy };
}

function handleTap(clientX, clientY) {
  const coords = mapTapToVideoCoords(clientX, clientY);
  // Find topmost COCO detection containing the tap (prefer higher score)
  let best = null;
  if (coords) {
    for (const d of lastDetections) {
      const [x, y, w, h] = d.bbox;
      if (coords.vx >= x && coords.vx <= x + w && coords.vy >= y && coords.vy <= y + h) {
        if (!best || d.score > best.score) best = d;
      }
    }
  }
  if (best) {
    // Hit a COCO box → show that object card immediately
    selectedDetection = best;
    showObjectCard(best);
    drawDetections();
    if (navigator.vibrate) navigator.vibrate(15);
    clearTimeout(selectedTimer);
    selectedTimer = setTimeout(() => {
      selectedDetection = null;
      lastSam2Mask = null;
      hideObjectCard();
      drawDetections();
    }, 12000);

    // In background: run CLIP for a more specific label (500+ vocabulary)
    const [bx, by, bw, bh] = best.bbox;
    runClipForLabel(best, bx, by, bw, bh);

    // In background: run SAM2 for pixel-accurate mask
    if (coords) runSam2ForObject(best, coords.vx, coords.vy);
  } else if (lastMobilenet.length > 0) {
    // No COCO box hit → fall back to MobileNet top-1 prediction for the whole frame
    showImageNetCard(lastMobilenet[0]);
    if (navigator.vibrate) navigator.vibrate(12);
    clearTimeout(selectedTimer);
    selectedTimer = setTimeout(() => {
      lastSam2Mask = null;
      hideObjectCard();
    }, 8000);

    // Run CLIP on the whole frame for a better label
    runClipForLabel(null, 0, 0, video.videoWidth, video.videoHeight);

    // Also run SAM2 at the tap point — gives a mask even for non-COCO objects
    if (coords) runSam2ForObject(null, coords.vx, coords.vy);
  }
}

// Run CLIP on the cropped region and update the object card with the specific label
async function runClipForLabel(detection, cropX, cropY, cropW, cropH) {
  try {
    const result = await runClip(cropX, cropY, cropW, cropH);
    if (!result) return;
    // Verify the selection is still active
    if (selectedDetection !== detection && detection !== null) return;
    // Only update if CLIP's confidence is decent (> 15%)
    if (result.score < 0.15) return;
    // Update the card with the CLIP label (more specific than COCO)
    const label = currentLang === "it" ? result.labelIt : result.label;
    objName.textContent = label.charAt(0).toUpperCase() + label.slice(1);
    objMeta.textContent = `${t("confidence")} · ${Math.round(result.score * 100)}%`;
    _lastSpoken = "";  // reset so TTS will speak the new label
    speakCurrent();
    showToast(currentLang === "it" ? `CLIP: ${result.labelIt}` : `CLIP: ${result.label}`);
  } catch (err) {
    console.warn("[clip] label update failed", err);
  }
}

// Run SAM2 for the tapped object, then redraw with the pixel-accurate mask
async function runSam2ForObject(detection, pointX, pointY) {
  try {
    const result = await runSam2(pointX, pointY);
    if (!result || !result.mask) return;
    // Verify the selection is still active (user might have tapped elsewhere)
    if (selectedDetection !== detection && detection !== null) return;
    lastSam2Mask = {
      mask: result.mask,
      width: result.width,
      height: result.height,
      color: detection ? detection.color : "#64D2FF"
    };
    drawDetections();  // redraws boxes + the SAM2 mask
    showToast(currentLang === "it" ? "Maschera SAM2 pronta" : "SAM2 mask ready");
  } catch (err) {
    console.warn("[sam2] run failed for object", err);
  }
}

tapLayer.addEventListener("click", (e) => {
  // Use the first touch/pointer position
  const x = e.clientX !== undefined ? e.clientX : (e.touches && e.touches[0]?.clientX);
  const y = e.clientY !== undefined ? e.clientY : (e.touches && e.touches[0]?.clientY);
  if (x !== undefined && y !== undefined) handleTap(x, y);
});

// ---------- Object card ----------
// ---------- Show card for a COCO-SSD detection (has a box, category, color) ----------
function showObjectCard(d) {
  const cat = CATEGORIES[d.category];
  objName.textContent = translateLabel(d.class);
  objMeta.textContent = `${t("confidence")} · ${Math.round(d.score * 100)}%`;
  objIcon.textContent = cat.icon;
  objCard.style.setProperty("--card-color", d.color);
  objCard.style.setProperty("--card-color-faded", d.color + "33");
  objCard.style.setProperty("--card-glow", d.color + "55");
  objCard.classList.add("visible");
  hint.style.opacity = "0";
  _lastSpoken = "";  // reset so the new object name will be spoken
  updateSpeakButton();
  speakCurrent();
}

// Show card for a MobileNet (ImageNet) classification — no box, just a label
function showImageNetCard(p) {
  const label = translateImageNetLabel(p.className);
  objName.textContent = label;
  objMeta.textContent = `${t("confidence")} · ${Math.round(p.probability * 100)}%`;
  objIcon.textContent = imagenetIcon(p.className);
  // Use a neutral cyan for ImageNet predictions
  const color = "#64D2FF";
  objCard.style.setProperty("--card-color", color);
  objCard.style.setProperty("--card-color-faded", color + "33");
  objCard.style.setProperty("--card-glow", color + "55");
  objCard.classList.add("visible");
  hint.style.opacity = "0";
  _lastSpoken = "";
  updateSpeakButton();
  speakCurrent();
}

function hideObjectCard() {
  objCard.classList.remove("visible");
  hint.style.opacity = "1";
  hint.textContent = lastDetections.length === 0 ? t("no_objects") : t("tap_object");
  _lastSpoken = "";
  updateSpeakButton();
}

function updateCountBadge() {
  if (lastDetections.length > 0) {
    countBadge.textContent = `${lastDetections.length} ${t("objects_in_view")}`;
    countBadge.classList.add("visible");
  } else {
    countBadge.classList.remove("visible");
  }
}

// ---------- Toast helper ----------
let _toastTimer = null;
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add("visible");
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => toast.classList.remove("visible"), 2200);
}

// ---------- Photo capture ----------
// Composes the current video frame + overlay (boxes + labels) onto a fresh canvas
// and saves it as a PNG download. Falls back to opening in a new tab on iOS Safari.
async function capturePhoto() {
  if (!video.videoWidth) { showToast(currentLang === "it" ? "Fotocamera non pronta" : "Camera not ready"); return; }
  captureBtn.style.opacity = "0.4";
  try {
    // Create a canvas at video resolution
    const cap = document.createElement("canvas");
    cap.width  = video.videoWidth;
    cap.height = video.videoHeight;
    const cctx = cap.getContext("2d");
    // 1) Draw the video frame
    cctx.drawImage(video, 0, 0, cap.width, cap.height);
    // 2) Draw the existing overlay (boxes, labels) on top
    //    The overlay canvas already matches video resolution.
    cctx.drawImage(overlay, 0, 0, cap.width, cap.height);
    // 3) Optional watermark with timestamp + detected count
    cctx.fillStyle = "rgba(0,0,0,0.6)";
    cctx.fillRect(0, cap.height - 44, cap.width, 44);
    cctx.fillStyle = "#fff";
    cctx.font = `600 ${Math.max(14, cap.width * 0.022)}px -apple-system, system-ui, sans-serif`;
    cctx.textBaseline = "middle"; cctx.textAlign = "left";
    const ts = new Date().toLocaleString(currentLang === "it" ? "it-IT" : "en-US");
    const info = `${lastDetections.length} ${t("objects_in_view")} · ${ts}`;
    cctx.fillText(info, 12, cap.height - 22);

    // Convert to blob
    const blob = await new Promise(res => cap.toBlob(res, "image/png", 0.92));
    if (!blob) throw new Error("toBlob failed");

    // Filename with timestamp
    const filename = `vision-${Date.now()}.png`;

    // Try Web Share API with files first (works on iOS Safari 15+ + Android)
    if (navigator.canShare && navigator.canShare({ files: [new File([blob], filename, { type: "image/png" })] })) {
      try {
        await navigator.share({
          files: [new File([blob], filename, { type: "image/png" })],
          title: "Vision Segmenter",
          text: selectedDetection
            ? `${translateLabel(selectedDetection.class)} (${Math.round(selectedDetection.score * 100)}%)`
            : (lastMobilenet[0] ? translateImageNetLabel(lastMobilenet[0].className) : "")
        });
        showToast(currentLang === "it" ? "Foto condivisa" : "Photo shared");
      } catch (e) {
        if (e.name !== "AbortError") throw e;
        // User cancelled — silently ignore
      }
    } else {
      // Fallback: trigger a download
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = filename;
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      showToast(currentLang === "it" ? "Foto salvata" : "Photo saved");
    }
  } catch (err) {
    console.error("Capture failed", err);
    showToast(currentLang === "it" ? "Errore salvataggio" : "Save error");
  } finally {
    captureBtn.style.opacity = "1";
  }
  if (navigator.vibrate) navigator.vibrate(20);
}

// ---------- Share (just the object name, no image) ----------
async function shareObject() {
  let text = "";
  if (selectedDetection) {
    text = `${translateLabel(selectedDetection.class)} (${Math.round(selectedDetection.score * 100)}%)`;
  } else if (lastMobilenet[0]) {
    text = `${translateImageNetLabel(lastMobilenet[0].className)} (${Math.round(lastMobilenet[0].probability * 100)}%)`;
  } else {
    showToast(currentLang === "it" ? "Niente da condividere" : "Nothing to share");
    return;
  }
  text += ` · Vision Segmenter`;
  try {
    if (navigator.share) {
      await navigator.share({ title: "Vision Segmenter", text });
    } else {
      // Fallback: copy to clipboard
      await navigator.clipboard.writeText(text);
      showToast(currentLang === "it" ? "Copiato negli appunti" : "Copied to clipboard");
    }
  } catch (e) {
    if (e.name !== "AbortError") console.warn(e);
  }
}

// ---------- Text-to-speech ----------
// Uses the Web Speech API. Pronounces the selected object name in EN or IT.
let _ttsEnabled = false;
let _lastSpoken = "";

function speakObjectName() {
  if (!("speechSynthesis" in window)) {
    showToast(currentLang === "it" ? "Sintesi vocale non supportata" : "TTS not supported");
    return;
  }
  // Toggle: if currently speaking, stop and disable auto-speak
  if (_ttsEnabled) {
    speechSynthesis.cancel();
    _ttsEnabled = false;
    speakBtn.classList.remove("speak-active");
    showToast(currentLang === "it" ? "Audio disattivato" : "Audio off");
    return;
  }
  // Enable auto-speak + speak current selection immediately
  _ttsEnabled = true;
  speakBtn.classList.add("speak-active");
  showToast(currentLang === "it" ? "Audio attivato" : "Audio on");
  speakCurrent();
}

function speakCurrent() {
  if (!_ttsEnabled || !("speechSynthesis" in window)) return;
  let text = "";
  if (selectedDetection) {
    text = translateLabel(selectedDetection.class);
  } else if (lastMobilenet[0]) {
    text = translateImageNetLabel(lastMobilenet[0].className);
  }
  if (!text || text === _lastSpoken) return;
  _lastSpoken = text;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = currentLang === "it" ? "it-IT" : "en-US";
  u.rate = 1.0; u.pitch = 1.0; u.volume = 1.0;
  // Try to pick a voice matching the language
  const voices = speechSynthesis.getVoices();
  const match = voices.find(v => v.lang === u.lang) || voices.find(v => v.lang.startsWith(currentLang));
  if (match) u.voice = match;
  speechSynthesis.speak(u);
}

// Pre-load voices (Chrome / iOS need this)
if ("speechSynthesis" in window) {
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}

// ---------- Wire up buttons ----------
captureBtn.addEventListener("click", capturePhoto);
shareBtn.addEventListener("click", shareObject);
speakBtn.addEventListener("click", speakObjectName);

// Enable speak button once we have any text to speak (card shown OR mobilenet available)
function updateSpeakButton() {
  speakBtn.disabled = !(selectedDetection || lastMobilenet.length > 0);
}

// ---------- Language toggle ----------
langBtn.addEventListener("click", () => {
  currentLang = currentLang === "en" ? "it" : "en";
  localStorage.setItem("vs_lang", currentLang);
  updateStaticTexts();
  drawDetections();
  updateScanStrip();  // re-translate chips
  if (navigator.vibrate) navigator.vibrate(8);
});

// ---------- Power button: stop / start ----------
powerBtn.addEventListener("click", () => {
  if (detectionLoopRunning) {
    stopCamera();
  } else {
    // Restart — model is still loaded, just need camera again
    detectionLoopRunning = true;
    powerBtn.textContent = "⏹";
    startCameraInBackground().then(() => {
      if (_cameraReady) detectLoop();
    });
  }
});

// ---------- Start ----------
init();
</script>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #000; color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased; user-select: none;
    touch-action: manipulation;
  }
  :root {
    --accent-blue: #0A84FF;
    --accent-purple: #BF5AF2;
    --glass: rgba(28, 28, 30, 0.6);
    --glass-border: rgba(255, 255, 255, 0.15);
  }

  #app { position: relative; width: 100vw; height: 100vh; height: 100dvh; overflow: hidden; }

  #video, #overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    object-fit: cover;
  }
  #video { z-index: 1; background: #000; }
  #overlay { z-index: 2; pointer-events: none; }
  #tapLayer { position: absolute; inset: 0; z-index: 3; }

  /* ---------- Crosshair (center target indicator) ---------- */
  .crosshair {
    position: absolute; top: 50%; left: 50%; z-index: 4;
    transform: translate(-50%, -50%);
    width: 80px; height: 80px;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .crosshair.hidden { opacity: 0; }
  .crosshair svg { width: 100%; height: 100%; }
  .crosshair .pulse {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--accent-blue);
    box-shadow: 0 0 16px var(--accent-blue);
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    50% { transform: translate(-50%, -50%) scale(1.8); opacity: 0.4; }
  }

  /* ---------- Top bar ---------- */
  .top-bar {
    position: absolute; top: 0; left: 0; right: 0; z-index: 10;
    padding: max(env(safe-area-inset-top), 16px) 16px 12px;
    display: flex; align-items: center; gap: 12px;
    background: linear-gradient(180deg, rgba(0,0,0,0.55), rgba(0,0,0,0));
    pointer-events: none;
  }
  .top-bar > * { pointer-events: auto; }

  .lang-toggle {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 14px; border-radius: 999px;
    background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border); color: #fff;
    font-size: 13px; font-weight: 700; letter-spacing: 0.5px;
    cursor: pointer; transition: transform 0.15s ease, background 0.2s ease;
  }
  .lang-toggle:active { transform: scale(0.94); background: rgba(255,255,255,0.15); }
  .lang-toggle .swap { font-size: 11px; opacity: 0.7; }

  .spacer { flex: 1; }

  .action-btn {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border); color: #fff;
    font-size: 17px; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    transition: transform 0.15s ease, background 0.2s ease;
  }
  .action-btn:active { transform: scale(0.92); background: rgba(255,255,255,0.18); }
  .action-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .action-btn.speak-active { background: var(--accent-purple); border-color: var(--accent-purple); }

  .power-btn {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border); color: #fff;
    font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s ease, background 0.2s ease;
  }
  .power-btn:active { transform: scale(0.92); background: rgba(255,255,255,0.15); }

  /* ---------- Bottom area ---------- */
  .bottom-area {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 10;
    padding: 16px 16px max(env(safe-area-inset-bottom), 32px);
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    background: linear-gradient(0deg, rgba(0,0,0,0.55), rgba(0,0,0,0));
    pointer-events: none;
  }
  .bottom-area > * { pointer-events: auto; }

  .hint {
    padding: 10px 18px; border-radius: 999px;
    background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.85);
    transition: opacity 0.3s ease;
  }

  .object-card {
    display: none; width: 100%; max-width: 420px;
    padding: 16px 20px; border-radius: 18px;
    background: var(--glass); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    border: 1.5px solid var(--card-color, #fff);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 24px var(--card-glow, transparent);
    animation: slideUp 0.35s cubic-bezier(0.2, 0.9, 0.3, 1.1);
  }
  .object-card.visible { display: flex; align-items: center; gap: 14px; }
  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .obj-icon {
    flex-shrink: 0; width: 44px; height: 44px; border-radius: 50%;
    background: var(--card-color-faded, rgba(255,255,255,0.15));
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  .obj-text { flex: 1; min-width: 0; }
  .obj-name {
    font-size: 19px; font-weight: 700; color: #fff; letter-spacing: -0.3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .obj-meta {
    margin-top: 3px; font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.65);
  }
  .obj-chip { flex-shrink: 0; width: 5px; height: 36px; border-radius: 3px; background: var(--card-color, #fff); }

  .toast {
    position: absolute; bottom: calc(max(env(safe-area-inset-bottom), 32px) + 90px); left: 50%; transform: translateX(-50%);
    z-index: 20;
    padding: 11px 18px; border-radius: 12px;
    background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    color: #fff; font-size: 13px; font-weight: 600;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s ease, transform 0.25s ease;
    max-width: 80vw; text-align: center;
  }
  .toast.visible { opacity: 1; transform: translateX(-50%) translateY(-6px); }

  /* ---------- Loader ---------- */
  .loader {
    position: absolute; inset: 0; z-index: 100;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px;
    background: #000; transition: opacity 0.4s ease;
  }
  .loader.hidden { opacity: 0; pointer-events: none; }
  .spinner {
    width: 40px; height: 40px; border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.15); border-top-color: var(--accent-blue);
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loader-text { font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.7); text-align: center; padding: 0 32px; }
  .loader-sub { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: -4px; word-break: break-all; max-width: 280px; text-align: center; }
  .loader-retry { display: none; margin-top: 8px; padding: 10px 22px; border-radius: 10px; border: 1px solid var(--glass-border); background: var(--glass); color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; }
  .loader-retry.visible { display: inline-block; }

  .ai-loading-badge {
    position: absolute; top: calc(max(env(safe-area-inset-top), 16px) + 64px); left: 50%; transform: translateX(-50%); z-index: 5;
    padding: 10px 18px; border-radius: 999px;
    background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.9);
    display: none; align-items: center; gap: 10px;
  }
  .ai-loading-badge.visible { display: inline-flex; }
  .ai-loading-badge .mini-spinner {
    width: 14px; height: 14px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.2); border-top-color: #fff;
    animation: spin 0.9s linear infinite;
  }

  .gate {
    position: absolute; inset: 0; z-index: 90;
    display: none; flex-direction: column; align-items: center; justify-content: center; gap: 24px;
    padding: 32px; text-align: center; background: #000;
  }
  .gate.visible { display: flex; }
  .gate-icon { font-size: 64px; opacity: 0.4; }
  .gate-title { font-size: 16px; font-weight: 600; color: #fff; line-height: 1.5; }
  .gate-btn {
    padding: 12px 24px; border-radius: 12px; border: none;
    background: var(--accent-blue); color: #fff;
    font-size: 15px; font-weight: 600; cursor: pointer;
    transition: transform 0.15s ease, opacity 0.2s ease;
  }
  .gate-btn:active { transform: scale(0.96); }
</style>
</head>
<body>
<div id="app">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>
  <div id="tapLayer"></div>

  <!-- Crosshair indicating the target zone (center) -->
  <div class="crosshair" id="crosshair">
    <svg viewBox="0 0 80 80">
      <circle cx="40" cy="40" r="32" fill="none" stroke="rgba(10,132,255,0.6)" stroke-width="2" stroke-dasharray="6 6"/>
      <line x1="40" y1="6" x2="40" y2="20" stroke="#0A84FF" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="40" y1="60" x2="40" y2="74" stroke="#0A84FF" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="6" y1="40" x2="20" y2="40" stroke="#0A84FF" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="60" y1="40" x2="74" y2="40" stroke="#0A84FF" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
    <div class="pulse"></div>
  </div>

  <!-- Top bar -->
  <div class="top-bar">
    <button class="lang-toggle" id="langBtn" aria-label="Switch language">
      <span id="langLabel">EN</span>
      <span class="swap">⇄</span>
    </button>
    <div class="spacer"></div>
    <button class="action-btn" id="speakBtn" aria-label="Speak object name" title="Speak" disabled>🔊</button>
    <button class="power-btn" id="powerBtn" aria-label="Stop camera">⏹</button>
  </div>

  <!-- Bottom: hint + object info card -->
  <div class="bottom-area">
    <div class="object-card" id="objCard">
      <div class="obj-icon" id="objIcon">●</div>
      <div class="obj-text">
        <div class="obj-name" id="objName">—</div>
        <div class="obj-meta" id="objMeta">Confidence · 0%</div>
      </div>
      <button class="action-btn" id="shareBtn" aria-label="Share" style="background:transparent;border:none;width:36px;height:36px;font-size:18px;">📤</button>
      <div class="obj-chip"></div>
    </div>
    <div class="hint" id="hint">Point at an object</div>
  </div>

  <div class="toast" id="toast"></div>

  <div class="loader" id="loader">
    <div class="spinner" id="spinner"></div>
    <div class="loader-text" id="loaderText">Loading AI model…</div>
    <div class="loader-sub" id="loaderSub"></div>
    <button class="loader-retry" id="loaderRetry">Retry</button>
  </div>

  <div class="ai-loading-badge" id="aiBadge"><div class="mini-spinner"></div><span id="aiBadgeText">AI loading…</span></div>

  <div class="gate" id="gate">
    <div class="gate-icon" id="gateIcon">📷</div>
    <div class="gate-title" id="gateTitle">Camera access is required.</div>
    <button class="gate-btn" id="gateBtn">Open Settings</button>
  </div>
</div>

// ---------- Dynamic script loader (for transformers.js) ----------
const TRANSFORMERS_CDNS = [
  "https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.2",
  "https://unpkg.com/@huggingface/transformers@3.0.2"
];

async function loadTransformers() {
  if (transformersModule) return transformersModule;
  setLoaderSub("Transformers.js…");
  for (const url of TRANSFORMERS_CDNS) {
    try {
      transformersModule = await import(url);
      console.log("[tfjs] loaded from", url);
      transformersModule.env.allowLocalModels = false;
      transformersModule.env.useBrowserCache = true;
      return transformersModule;
    } catch (e) {
      console.warn("[tfjs] failed", url, e);
    }
  }
  throw new Error("Could not load transformers.js from any CDN");
}

// ---------- SAM2 (stable tiny variant) ----------
const SAM2_MODEL_ID = "Xenova/sam2-hiera-tiny";

async function loadSam2() {
  if (sam2Pipeline) return sam2Pipeline;
  setBadge(t("loading_model"));
  const tfjs = await loadTransformers();
  setLoaderSub("SAM2 model…");
  // Use q8 + wasm — more stable on iPhone than fp32 + webgpu
  sam2Pipeline = await tfjs.Sam2Pipeline.from_pretrained(SAM2_MODEL_ID, {
    dtype: "q8",
    device: "wasm",
  });
  console.log("[sam2] loaded");
  setBadge("");
  return sam2Pipeline;
}

// Run SAM2 at the center point of the video. Returns { mask, width, height } or null.
async function runSam2AtCenter() {
  if (!sam2Pipeline || !video.videoWidth) return null;
  const w = video.videoWidth, h = video.videoHeight;
  // Center point (small offset for stability)
  const cx = Math.floor(w / 2);
  const cy = Math.floor(h / 2);

  // Capture current frame
  const tmp = document.createElement("canvas");
  tmp.width = w; tmp.height = h;
  const tctx = tmp.getContext("2d");
  tctx.drawImage(video, 0, 0, w, h);
  const imageData = tctx.getImageData(0, 0, w, h);

  const inputs = {
    image: { data: imageData.data, width: w, height: h, channels: 4 },
    point_coords: [[[cx / w, cy / h]]],
    point_labels: [[1]],
  };

  const output = await sam2Pipeline(inputs);
  if (!output || !output.masks) return null;

  // Extract best mask by IoU
  const masks = output.masks;
  const ious = output.iou_scores;
  let maskData, maskW = w, maskH = h;

  if (masks.data && masks.dims) {
    const N = masks.dims[0];
    const H = masks.dims[masks.dims.length - 2];
    const W = masks.dims[masks.dims.length - 1];
    maskW = W; maskH = H;
    let bestIdx = 0, bestIou = -1;
    if (ious && ious.data) {
      for (let i = 0; i < N; i++) {
        if (ious.data[i] > bestIou) { bestIou = ious.data[i]; bestIdx = i; }
      }
    }
    const sliceLen = H * W;
    maskData = new Uint8Array(sliceLen);
    const start = bestIdx * sliceLen;
    for (let i = 0; i < sliceLen; i++) maskData[i] = masks.data[start + i] > 0.5 ? 1 : 0;
  } else {
    maskData = new Uint8Array(masks.length);
    for (let i = 0; i < masks.length; i++) maskData[i] = masks[i] > 0.5 ? 1 : 0;
  }

  // Sanity: reject empty masks or masks that fill >95% of frame (likely background)
  let count = 0;
  for (let i = 0; i < maskData.length; i++) if (maskData[i]) count++;
  const ratio = count / maskData.length;
  if (count === 0 || ratio > 0.95) return null;

  return { mask: maskData, width: maskW, height: maskH };
}

// ---------- CLIP zero-shot classifier ----------
const CLIP_MODEL_ID = "Xenova/clip-vit-base-patch32";

async function loadClip() {
  if (clipPipeline) return clipPipeline;
  const tfjs = await loadTransformers();
  setLoaderSub("CLIP model…");
  clipPipeline = await tfjs.pipeline("zero-shot-image-classification", CLIP_MODEL_ID, {
    dtype: "q8",
    device: "wasm",
  });
  console.log("[clip] loaded, vocab:", VOCABULARY.length);
  return clipPipeline;
}

// Run CLIP on a cropped region. Returns { en, it, score } or null.
async function runClipOnCrop(cropX, cropY, cropW, cropH) {
  if (!clipPipeline) return null;
  const w = video.videoWidth, h = video.videoHeight;
  const cx = Math.max(0, Math.floor(cropX));
  const cy = Math.max(0, Math.floor(cropY));
  const cw = Math.min(w - cx, Math.floor(cropW));
  const ch = Math.min(h - cy, Math.floor(cropH));
  if (cw < 10 || ch < 10) return null;

  const tmp = document.createElement("canvas");
  tmp.width = cw; tmp.height = ch;
  const tctx = tmp.getContext("2d");
  tctx.drawImage(video, cx, cy, cw, ch, 0, 0, cw, ch);
  const dataUrl = tmp.toDataURL("image/jpeg", 0.85);

  const labels = VOCABULARY.map(([en]) => `a photo of a ${en}`);
  const output = await clipPipeline(dataUrl, labels);
  if (!output || output.length === 0) return null;

  const top = output[0];
  const enLabel = top.label.replace(/^a photo of a /, "");
  const idx = VOCABULARY.findIndex(([en]) => en === enLabel);
  const itLabel = idx >= 0 ? VOCABULARY[idx][1] : enLabel;
  return { en: enLabel, it: itLabel, score: top.score };
}

// ---------- Mask outline (Moore neighborhood tracing) ----------
function traceMaskOutline(mask, w, h) {
  let start = -1;
  for (let y = 0; y < h && start === -1; y++) {
    for (let x = 0; x < w && start === -1; x++) {
      if (mask[y * w + x]) start = y * w + x;
    }
  }
  if (start === -1) return null;

  const dx = [1, 1, 0, -1, -1, -1, 0, 1];
  const dy = [0, 1, 1, 1, 0, -1, -1, -1];
  const pts = [];
  let cx = start % w, cy = Math.floor(start / w);
  let dir = 7;
  const maxSteps = w * h * 4;
  let steps = 0;
  const visited = new Set();
  while (steps < maxSteps) {
    const key = cy * w + cx;
    if (visited.has(key) && visited.size > 2) break;
    visited.add(key);
    pts.push([cx, cy]);
    let found = false;
    for (let i = 0; i < 8; i++) {
      const ndir = (dir + 1 + i) % 8;
      const nx = cx + dx[ndir], ny = cy + dy[ndir];
      if (nx < 0 || ny < 0 || nx >= w || ny >= h) continue;
      if (mask[ny * w + nx]) {
        cx = nx; cy = ny; dir = (ndir + 4) % 8;
        found = true; break;
      }
    }
    if (!found) break;
    steps++;
  }
  return pts.length > 4 ? pts : null;
}

// ---------- Drawing: pixel-accurate shape (NO rectangles) ----------
function drawMask() {
  ctx.clearRect(0, 0, overlay.width, overlay.height);
  if (!currentMask) return;

  const { mask, width: mw, height: mh, color } = currentMask;
  const videoW = overlay.width, videoH = overlay.height;
  const scaleX = videoW / mw, scaleY = videoH / mh;

  // 1) Translucent fill
  const tmp = document.createElement("canvas");
  tmp.width = mw; tmp.height = mh;
  const tctx = tmp.getContext("2d");
  const imgData = tctx.createImageData(mw, mh);
  const r = parseInt(color.slice(1,3), 16);
  const g = parseInt(color.slice(3,5), 16);
  const b = parseInt(color.slice(5,7), 16);
  for (let i = 0; i < mask.length; i++) {
    if (mask[i]) {
      imgData.data[i*4]   = r;
      imgData.data[i*4+1] = g;
      imgData.data[i*4+2] = b;
      imgData.data[i*4+3] = 80;
    }
  }
  tctx.putImageData(imgData, 0, 0);
  ctx.save();
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = "high";
  ctx.drawImage(tmp, 0, 0, videoW, videoH);
  ctx.restore();

  // 2) Smooth outline via Catmull-Rom → Bezier
  const pts = traceMaskOutline(mask, mw, mh);
  if (pts && pts.length > 4) {
    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth = Math.max(2.5, videoW * 0.006);
    ctx.lineJoin = "round";
    ctx.lineCap = "round";
    ctx.shadowColor = color;
    ctx.shadowBlur = 16;
    ctx.beginPath();
    ctx.moveTo(pts[0][0] * scaleX, pts[0][1] * scaleY);
    const n = pts.length;
    for (let i = 0; i < n; i++) {
      const p0 = pts[(i - 1 + n) % n];
      const p1 = pts[i];
      const p2 = pts[(i + 1) % n];
      const p3 = pts[(i + 2) % n];
      const cp1x = (p1[0] + (p2[0] - p0[0]) / 6) * scaleX;
      const cp1y = (p1[1] + (p2[1] - p0[1]) / 6) * scaleY;
      const cp2x = (p2[0] - (p3[0] - p1[0]) / 6) * scaleX;
      const cp2y = (p2[1] - (p3[1] - p1[1]) / 6) * scaleY;
      ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, p2[0] * scaleX, p2[1] * scaleY);
    }
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
  }

  // 3) Label badge above the mask
  if (currentLabel) {
    const label = currentLang === "it" ? currentLabel.it : currentLabel.en;
    const confTxt = " " + Math.round(currentLabel.score * 100) + "%";
    ctx.font = `600 ${Math.max(14, videoW * 0.026)}px -apple-system, system-ui, sans-serif`;
    const labelW = ctx.measureText(label).width;
    const confW = ctx.measureText(confTxt).width;
    const pillH = Math.max(22, videoW * 0.04);
    const pillW = labelW + confW + 20;
    const pillX = videoW / 2 - pillW / 2;
    const pillY = 12;
    ctx.fillStyle = color;
    roundRect(ctx, pillX, pillY, pillW, pillH, pillH / 2);
    ctx.fill();
    ctx.fillStyle = "#000";
    ctx.textBaseline = "middle";
    ctx.textAlign = "left";
    ctx.fillText(label, pillX + 10, pillY + pillH / 2);
    ctx.globalAlpha = 0.7;
    ctx.fillText(confTxt, pillX + 10 + labelW, pillY + pillH / 2);
    ctx.globalAlpha = 1.0;
  }
}

function roundRect(ctx, x, y, w, h, r) {
  r = Math.max(0, Math.min(r, w / 2, h / 2));
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ---------- Main segmentation loop (5 Hz on center) ----------
async function segmentLoop() {
  if (!segmentLoopRunning || !sam2Pipeline) return;
  try {
    setBadge(t("segmenting"));
    const result = await runSam2AtCenter();
    if (result) {
      const cat = currentLabel ? categoryOf(currentLabel.en) : "other";
      currentMask = { ...result, color: CATEGORIES[cat].color };
      drawMask();
      hint.textContent = currentLabel ? t("detected_hint") : t("recognizing_hint");

      // Trigger CLIP if not running and no label yet (or label is stale)
      if (!clipRunning && (!currentLabel || currentLabel.score < 0.3)) {
        runClipOnMask();
      }
    } else {
      // No object detected — clear mask
      if (currentMask) {
        currentMask = null;
        currentLabel = null;
        drawMask();
      }
      hint.textContent = t("no_object");
      setBadge("");
    }
  } catch (err) {
    console.warn("[seg] error", err);
  }
  setBadge("");
  // 5 Hz loop
  setTimeout(() => { if (segmentLoopRunning) segmentLoop(); }, 200);
}

// Run CLIP on the bounding box of the current mask
async function runClipOnMask() {
  if (!currentMask || clipRunning) return;
  clipRunning = true;
  setBadge(t("recognizing"));
  try {
    // Compute mask bounding box
    const { mask, width: mw, height: mh } = currentMask;
    let minX = mw, minY = mh, maxX = 0, maxY = 0;
    for (let y = 0; y < mh; y++) {
      for (let x = 0; x < mw; x++) {
        if (mask[y * mw + x]) {
          if (x < minX) minX = x;
          if (x > maxX) maxX = x;
          if (y < minY) minY = y;
          if (y > maxY) maxY = y;
        }
      }
    }
    // Convert mask coords to video coords
    const videoW = video.videoWidth, videoH = video.videoHeight;
    const scaleX = videoW / mw, scaleY = videoH / mh;
    const cropX = minX * scaleX;
    const cropY = minY * scaleY;
    const cropW = (maxX - minX) * scaleX;
    const cropH = (maxY - minY) * scaleY;

    // Add 15% padding around the crop for context
    const padX = cropW * 0.15, padY = cropH * 0.15;
    const result = await runClipOnCrop(
      Math.max(0, cropX - padX),
      Math.max(0, cropY - padY),
      cropW + padX * 2,
      cropH + padY * 2
    );
    if (result && result.score > 0.1) {
      currentLabel = result;
      // Update mask color based on category
      const cat = categoryOf(result.en);
      currentMask.color = CATEGORIES[cat].color;
      drawMask();
      updateObjectCard();
      // TTS
      if (_ttsEnabled) {
        const text = currentLang === "it" ? result.it : result.en;
        if (text && text !== lastClipText) {
          lastClipText = text;
          speak(text);
        }
      }
    }
  } catch (err) {
    console.warn("[clip] error", err);
  } finally {
    clipRunning = false;
    setBadge("");
  }
}

// ---------- Object card ----------
function updateObjectCard() {
  if (!currentLabel) {
    objCard.classList.remove("visible");
    return;
  }
  const label = currentLang === "it" ? currentLabel.it : currentLabel.en;
  const cap = label.charAt(0).toUpperCase() + label.slice(1);
  objName.textContent = cap;
  objMeta.textContent = `${t("confidence")} · ${Math.round(currentLabel.score * 100)}%`;
  const cat = categoryOf(currentLabel.en);
  objIcon.textContent = CATEGORIES[cat].icon;
  objCard.style.setProperty("--card-color", CATEGORIES[cat].color);
  objCard.style.setProperty("--card-color-faded", CATEGORIES[cat].color + "33");
  objCard.style.setProperty("--card-glow", CATEGORIES[cat].color + "55");
  objCard.classList.add("visible");
  speakBtn.disabled = false;
}

// ---------- TTS ----------
let _ttsEnabled = false;
function speak(text) {
  if (!("speechSynthesis" in window) || !text) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = currentLang === "it" ? "it-IT" : "en-US";
  u.rate = 1.0; u.pitch = 1.0; u.volume = 1.0;
  const voices = speechSynthesis.getVoices();
  const match = voices.find(v => v.lang === u.lang) || voices.find(v => v.lang.startsWith(currentLang));
  if (match) u.voice = match;
  speechSynthesis.speak(u);
}
if ("speechSynthesis" in window) speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();

speakBtn.addEventListener("click", () => {
  if (_ttsEnabled) {
    speechSynthesis.cancel();
    _ttsEnabled = false;
    speakBtn.classList.remove("speak-active");
    showToast(currentLang === "it" ? "Audio disattivato" : "Audio off");
  } else {
    _ttsEnabled = true;
    speakBtn.classList.add("speak-active");
    showToast(currentLang === "it" ? "Audio attivato" : "Audio on");
    if (currentLabel) speak(currentLang === "it" ? currentLabel.it : currentLabel.en);
  }
});

// ---------- Capture photo (frame + mask) ----------
async function capturePhoto() {
  if (!video.videoWidth) return;
  try {
    const cap = document.createElement("canvas");
    cap.width = video.videoWidth; cap.height = video.videoHeight;
    const cctx = cap.getContext("2d");
    cctx.drawImage(video, 0, 0, cap.width, cap.height);
    cctx.drawImage(overlay, 0, 0, cap.width, cap.height);
    cctx.fillStyle = "rgba(0,0,0,0.6)";
    cctx.fillRect(0, cap.height - 44, cap.width, 44);
    cctx.fillStyle = "#fff";
    cctx.font = `600 ${Math.max(14, cap.width * 0.022)}px -apple-system, system-ui, sans-serif`;
    cctx.textBaseline = "middle"; cctx.textAlign = "left";
    const ts = new Date().toLocaleString(currentLang === "it" ? "it-IT" : "en-US");
    const label = currentLabel ? (currentLang === "it" ? currentLabel.it : currentLabel.en) : "";
    const info = `${label} ${currentLabel ? "· " + Math.round(currentLabel.score * 100) + "%" : ""} · ${ts}`;
    cctx.fillText(info, 12, cap.height - 22);
    const blob = await new Promise(res => cap.toBlob(res, "image/png", 0.92));
    const filename = `vision-${Date.now()}.png`;
    if (navigator.canShare && navigator.canShare({ files: [new File([blob], filename, { type: "image/png" })] })) {
      try {
        await navigator.share({
          files: [new File([blob], filename, { type: "image/png" })],
          title: "Vision Segmenter",
          text: label
        });
        showToast(currentLang === "it" ? "Foto condivisa" : "Photo shared");
      } catch (e) { if (e.name !== "AbortError") throw e; }
    } else {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = filename;
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      showToast(currentLang === "it" ? "Foto salvata" : "Photo saved");
    }
  } catch (err) {
    console.error("Capture failed", err);
    showToast(currentLang === "it" ? "Errore salvataggio" : "Save error");
  }
  if (navigator.vibrate) navigator.vibrate(20);
}

// ---------- Share ----------
shareBtn.addEventListener("click", async () => {
  if (!currentLabel) { showToast(currentLang === "it" ? "Niente da condividere" : "Nothing to share"); return; }
  const label = currentLang === "it" ? currentLabel.it : currentLabel.en;
  const text = `${label} (${Math.round(currentLabel.score * 100)}%) · Vision Segmenter`;
  try {
    if (navigator.share) await navigator.share({ title: "Vision Segmenter", text });
    else { await navigator.clipboard.writeText(text); showToast(currentLang === "it" ? "Copiato" : "Copied"); }
  } catch (e) { if (e.name !== "AbortError") console.warn(e); }
});

// ---------- Tap → capture (since detection is automatic now) ----------
tapLayer.addEventListener("click", () => {
  if (currentLabel) capturePhoto();
});

// ---------- Language ----------
langBtn.addEventListener("click", () => {
  currentLang = currentLang === "en" ? "it" : "en";
  localStorage.setItem("vs_lang", currentLang);
  langLabel.textContent = currentLang.toUpperCase();
  updateObjectCard();
  drawMask();
  if (navigator.vibrate) navigator.vibrate(8);
});

// ---------- Power button ----------
powerBtn.addEventListener("click", () => {
  if (cameraRunning) stopCamera();
  else startCamera();
});

function stopCamera() {
  segmentLoopRunning = false;
  if (stream) stream.getTracks().forEach(t => t.stop());
  stream = null;
  video.srcObject = null;
  ctx.clearRect(0, 0, overlay.width, overlay.height);
  currentMask = null;
  currentLabel = null;
  cameraRunning = false;
  powerBtn.textContent = "▶";
  hint.textContent = t("stopped");
  objCard.classList.remove("visible");
  crosshair.classList.add("hidden");
}

// ---------- Boot ----------
async function init() {
  langLabel.textContent = currentLang.toUpperCase();
  hint.textContent = t("loading_model");
  loader.classList.remove("hidden");

  // Start camera + load models in parallel
  const cameraTask = startCamera();
  const modelsTask = (async () => {
    try {
      await loadSam2();
      await loadClip();
    } catch (err) {
      console.error("Model load failed", err);
      loaderText.textContent = currentLang === "it" ? "Errore caricamento modelli" : "Model load failed";
      setLoaderSub((err.message || "Unknown error") + " — tap Retry");
      showRetry();
      throw err;
    }
  })();

  const [camRes, modelsRes] = await Promise.allSettled([cameraTask, modelsTask]);
  if (camRes.status === "rejected") {
    loader.classList.add("hidden");
    const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
    showGate("📷", isIOS ? t("no_camera_ios") : t("no_camera"), t("reload"), () => location.reload());
    return;
  }
  if (modelsRes.status === "rejected") return;

  loader.classList.add("hidden");
  cameraRunning = true;
  powerBtn.textContent = "⏹";
  crosshair.classList.remove("hidden");
  hint.textContent = t("pointing_hint");
  segmentLoopRunning = true;
  segmentLoop();
}

async function startCamera() {
  setLoaderSub(t("loading_camera"));
  stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: { ideal: "environment" }, width: { ideal: 640 }, height: { ideal: 480 } },
    audio: false
  });
  video.srcObject = stream;
  await video.play();
  if (!video.videoWidth) {
    await new Promise(res => video.onloadedmetadata = res);
    await video.play();
  }
  overlay.width = video.videoWidth;
  overlay.height = video.videoHeight;
}

function showGate(icon, title, btnText, btnAction) {
  gateIcon.textContent = icon;
  gateTitle.textContent = title;
  gateBtn.textContent = btnText;
  gateBtn.onclick = btnAction;
  gate.classList.add("visible");
}

loaderRetry.addEventListener("click", () => {
  hideRetry();
  setLoaderSub("");
  init();
});

// ---------- Gate button ----------
gateBtn.addEventListener("click", () => location.reload());

// Start
init();
</script>
